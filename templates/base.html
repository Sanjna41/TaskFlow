{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaskFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/taskflow.css' %}">
</head>
<body>
  <div class="app-shell">
    {% if user.is_authenticated %}
      <aside class="sidebar">
        <div class="brand">TASKFLOW</div>
        <nav class="nav flex-column gap-1">
          <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="nav-link" href="{% url 'project_list' %}">Projects</a>
          <a class="nav-link" href="{% url 'profile' %}">Profile</a>
          <a class="nav-link" href="/api/">REST API</a>
          <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="nav-link btn btn-link text-start">Logout</button></form>
        </nav>
      </aside>
    {% endif %}
    <main class="content">
      {% for message in messages %}<div class="alert alert-{{ message.tags }} shadow-sm">{{ message }}</div>{% endfor %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/taskflow.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
