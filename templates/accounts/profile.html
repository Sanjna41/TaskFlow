{% extends "base.html" %}
{% block title %}Profile | TaskFlow{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Profile</h1>
  <p class="text-muted">{{ request.user.get_full_name }} · {{ request.user.profile.get_role_display }}</p>
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Save Profile</button>
    <a class="btn btn-outline-secondary" href="{% url 'change_password' %}">Change Password</a>
  </form>
</section>
{% endblock %}
